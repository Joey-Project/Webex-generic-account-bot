# Example configuration for webex-generic-account-bot.
#
# Keep secrets in environment variables or token files, not in this file.

state_file = ".codex-tmp/generic-account-bot/state.jsonl"

# Optional. If omitted, the bot resolves people/me from the Webex token at startup.
# self_person_id = "Y2lzY29zcGFyazovL3VzL1BFT1BMRS9..."

[server]
bind = "127.0.0.1:8787"
event_path = "/webex/events"
health_path = "/healthz"
sidecar_token_env = "WEBEX_SIDECAR_TOKEN"
allow_unauthenticated = false
max_concurrent_requests = 4

# Keep this longer than the expected Codex runtime and shorter than the sidecar
# retry horizon. The JS sidecar's WEBEX_SIDECAR_FORWARD_TIMEOUT_MS should be
# greater than codex.timeout_secs.
attempt_lease_secs = 1200

[webex]
access_token_env = "WEBEX_ACCESS_TOKEN"
access_token_file_env = "WEBEX_ACCESS_TOKEN_FILE"
# access_token_file = "/var/lib/webex-headless-access/access-token"

[codex]
bin = "codex"
cwd = "."
codex_home = "/var/lib/webex-generic-account-bot/codex-home"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
sandbox = "read-only"
approval_policy = "never"
timeout_secs = 600
output_limit_chars = 6000
skip_git_repo_check = false
ephemeral = true

[codex.isolation]
mode = "current-user"
trusted_prompt_authors = true

[[rooms]]
name = "Mention-driven Codex room"
room_id = "WEBEX_ROOM_ID_HERE"
trigger = "mention"
allowed_person_emails = ["joey@example.com"]
prompt_template = """
You are Codex running from a Webex generic-account bot.

Reply concisely in Simplified Chinese unless the user asks otherwise.

Room: {room_id}
Message ID: {message_id}
Sender: {person_email}

User message:
{body}
"""

[[rooms]]
name = "Prefix command room"
room_id = "ANOTHER_WEBEX_ROOM_ID"
trigger = "prefix"
prefixes = ["@codex", "/codex"]
allowed_person_emails = ["joey@example.com"]
prompt_template = """
Handle this Webex command as Codex.

Message:
{body}
"""

[[rooms]]
name = "Production source mirrored to staging"
room_id = "PRODUCTION_WEBEX_ROOM_ID"
output_room_id = "STAGING_WEBEX_ROOM_ID"
forward_source_message = true
read_only_source = true
trigger = "always"
allowed_person_emails = ["trusted-sender@example.com"]
# Optional: keep the default "markdown" for normal rooms. Jenkins triage rooms
# can use "jenkins-diagnosis-json" so Codex returns structured fields and the
# bot renders the final Webex Markdown deterministically.
# reply_format = "jenkins-diagnosis-json"
prompt_template = """
You are processing a read-only production Space message in staging mode.
The bot must not reply in the production Space. It will first mirror the source
message into the staging Space, then reply under that mirrored message.

Room: {room_id}
Message ID: {message_id}
Sender: {person_email}

Source message:
{body}
"""

# Optional: for Jenkins triage rooms, prefetch read-only diagnostics in the bot
# layer and append them to the Codex prompt. This avoids requiring Codex sandbox
# network access to Jenkins.
[rooms.jenkins_context]
script = "/opt/webex-generic-account-bot/scripts/jenkins-readonly.mjs"
env_file = "/etc/webex-generic-account-bot/jenkins.env"
timeout_secs = 30
max_urls = 3
output_limit_chars = 5000
